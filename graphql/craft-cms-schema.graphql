# Directives
# ---------------------------------------------------------------------------

"""Transform an image asset on-the-fly."""
directive @transform(
  handle: String
  width: Int
  height: Int
  mode: String
  position: String
  interlace: String
  quality: Int
  format: String
  immediately: Boolean
) on FIELD

"""Parse ref tags in the field value."""
directive @parseRefs on FIELD

"""Format a DateTime value."""
directive @formatDateTime(
  format: String
  timezone: String
  locale: String
) on FIELD

"""Render a Markdown string."""
directive @markdown(flavor: String) on FIELD

"""Strip HTML tags from a string field."""
directive @stripTags(allowed: [String]) on FIELD

"""Trim whitespace from a string field."""
directive @trim on FIELD

"""Format a Money value."""
directive @money(
  format: String
  locale: String
) on FIELD
