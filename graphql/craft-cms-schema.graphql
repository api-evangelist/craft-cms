# ---------------------------------------------------------------------------
# Mutation type
# ---------------------------------------------------------------------------

"""
Root mutation type. Save/delete mutations are dynamically registered per
section, entry type, volume, and category/tag group at runtime.
"""
type Mutation {
  """Delete an entry."""
  deleteEntry(id: Int!): Boolean

  """Create a draft for an entry and return the draft ID."""
  createDraft(
    id: Int!
    name: String
    notes: String
    provisional: Boolean
    creatorId: Int
  ): Int

  """Publish a draft for the entry and return the entry ID."""
  publishDraft(id: Int!, provisional: Boolean): Int

  """Delete an asset."""
  deleteAsset(id: Int!): Boolean

  """Used to ping the endpoint and confirm the API is reachable."""
  ping: String
}

