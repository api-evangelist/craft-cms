description: >-
  Craft CMS offers four editions: Solo (free forever, one user), Team ($279
  per project, up to five users), Pro ($399 per project, unlimited users and
  groups), and Enterprise (custom pricing with SAML SSO and premium support).
  Team and Pro editions include one year of updates and are free when hosted on
  Craft Cloud. All editions support the GraphQL API and Element API plugin.
sources:
  - https://craftcms.com/pricing
plans:
  - id: craft-cms-solo
    name: Solo
    type: free
    description: >-
      Free forever for self-hosted projects. Includes one user account,
      unlimited content types, entries, pages, locales, asset management,
      multi-site, search, live preview, image editor, content versioning,
      scheduling, categories/tags, and customizable dashboard. Supports
      GraphQL API.
